services:
  backend:
    build: ./backend
    ports: ["3001:3001"]
    depends_on:
      scylladb: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    env_file: .env
    environment:
      - SCYLLA_CONTACT_POINTS=scylladb
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://treasury:treasury_dev@rabbitmq:5672
    restart: unless-stopped
    networks: [app]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    restart: unless-stopped
    networks: [app]

  scylladb:
    image: scylladb/scylla
    command: ["--smp", "1", "--memory", "1G", "--overprovisioned", "1", "--developer-mode", "1"]
    ports: ["9042:9042"]
    volumes: [scylladata:/var/lib/scylla]
    healthcheck: { test: ["CMD-SHELL","cqlsh -e \"DESCRIBE KEYSPACES\" > /dev/null 2>&1"], interval: 10s, timeout: 10s, retries: 15, start_period: 30s }
    networks: [app]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 5s, timeout: 5s, retries: 5 }
    networks: [app]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672","15672:15672"]
    environment: { RABBITMQ_DEFAULT_USER: treasury, RABBITMQ_DEFAULT_PASS: treasury_dev }
    volumes: [mqdata:/var/lib/rabbitmq]
    healthcheck: { test: ["CMD","rabbitmq-diagnostics","-q","check_running"], interval: 10s, timeout: 10s, retries: 5 }
    networks: [app]

volumes: { scylladata: {}, redisdata: {}, mqdata: {} }
networks: { app: { driver: bridge } }
