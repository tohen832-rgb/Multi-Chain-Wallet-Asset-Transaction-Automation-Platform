version: '3.8'
services:
  backend:
    build: ./backend
    ports: ["3001:3001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    env_file: .env
    restart: unless-stopped
    networks: [app]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    restart: unless-stopped
    networks: [app]

  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment: { POSTGRES_DB: treasury, POSTGRES_USER: treasury, POSTGRES_PASSWORD: treasury_dev }
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U treasury"], interval: 5s, timeout: 5s, retries: 5 }
    networks: [app]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 5s, timeout: 5s, retries: 5 }
    networks: [app]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672","15672:15672"]
    environment: { RABBITMQ_DEFAULT_USER: treasury, RABBITMQ_DEFAULT_PASS: treasury_dev }
    volumes: [mqdata:/var/lib/rabbitmq]
    healthcheck: { test: ["CMD","rabbitmq-diagnostics","-q","check_running"], interval: 10s, timeout: 10s, retries: 5 }
    networks: [app]

volumes: { pgdata: {}, redisdata: {}, mqdata: {} }
networks: { app: { driver: bridge } }
